<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aentho PWA Icon Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .icon-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        .icon-card:hover {
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }
        .icon-card h3 {
            color: #374151;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: white;
            margin-bottom: 12px;
        }
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        button.secondary {
            background: #6b7280;
        }
        button.secondary:hover {
            background: #4b5563;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
        }
        .actions button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
        }
        .success-message {
            display: none;
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            color: #047857;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Aentho PWA Icon Generator</h1>
        <p class="subtitle">Generate and download all required app icons</p>
        
        <div class="success-message" id="successMsg">✅ Icons generated! Download them from the links below.</div>
        
        <div class="grid" id="iconGrid"></div>
        
        <div class="actions">
            <button onclick="generateAllIcons()">🎨 Generate All Icons</button>
            <button class="secondary" onclick="downloadAll()">⬇️ Download All</button>
        </div>
    </div>

    <script>
        /**
         * Generate icon with animated growth chart
         */
        function generateIcon(size, isMaskable = false) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const padding = size * 0.1;
            const chartArea = size - padding * 2;

            // Background
            if (isMaskable) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            } else {
                ctx.fillStyle = '#ffffff';
            }
            ctx.fillRect(0, 0, size, size);

            // Draw gradient circle background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#7c3aed');
            ctx.fillStyle = isMaskable ? gradient : '#f0f7ff';
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, chartArea / 2, 0, Math.PI * 2);
            ctx.fill();

            // Chart data points (ascending)
            const dataPoints = [2, 3.5, 2.8, 4.2, 3.8, 5.5, 4.9, 6.8, 8.2, 7.5, 9.1, 8.5];
            const maxValue = Math.max(...dataPoints);
            const barWidth = chartArea / (dataPoints.length * 1.5);
            const barGap = barWidth * 0.3;

            // Draw bars
            ctx.fillStyle = isMaskable ? '#ffffff' : '#2563eb';
            dataPoints.forEach((value, index) => {
                const barHeight = (value / maxValue) * (chartArea * 0.6);
                const x = padding + (index * (barWidth + barGap)) + barGap;
                const y = size - padding - barHeight;
                ctx.fillRect(x, y, barWidth, barHeight);
            });

            // Draw trend line
            if (!isMaskable) {
                ctx.strokeStyle = '#10b981';
                ctx.lineWidth = size * 0.03;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();

                dataPoints.forEach((value, index) => {
                    const barHeight = (value / maxValue) * (chartArea * 0.6);
                    const x = padding + (index * (barWidth + barGap)) + barGap + barWidth / 2;
                    const y = size - padding - barHeight;
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }

            // Draw up arrow
            const arrowSize = size * 0.15;
            const arrowX = size - padding - arrowSize * 0.6;
            const arrowY = padding + arrowSize * 0.6;

            ctx.fillStyle = '#10b981';
            ctx.fillRect(arrowX - arrowSize * 0.1, arrowY, arrowSize * 0.2, arrowSize * 0.6);
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(arrowX - arrowSize * 0.2, arrowY + arrowSize * 0.3);
            ctx.lineTo(arrowX + arrowSize * 0.2, arrowY + arrowSize * 0.3);
            ctx.fill();

            // Add text label
            if (size >= 192) {
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${size * 0.12}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('Aentho', size / 2, size - padding * 0.5);
            }

            return canvas;
        }

        function createIconCard(name, size, isMaskable = false) {
            const canvas = generateIcon(size, isMaskable);
            const card = document.createElement('div');
            card.className = 'icon-card';
            
            const label = `${size}x${size}${isMaskable ? ' (Maskable)' : ''}`;
            const filename = `icon-${size}x${size}${isMaskable ? '-maskable' : ''}.png`;
            
            card.innerHTML = `
                <h3>${label}</h3>
                <div></div>
                <div class="controls">
                    <button onclick="downloadIcon('${filename}')">⬇️ Download</button>
                    <button class="secondary" onclick="copyToClipboard(this)">📋 Copy</button>
                </div>
            `;
            
            card.querySelector('div:nth-child(2)').appendChild(canvas);
            card.canvasElement = canvas;
            card.filename = filename;
            
            return card;
        }

        function generateAllIcons() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            
            const sizes = [192, 512];
            
            sizes.forEach(size => {
                grid.appendChild(createIconCard(`Icon ${size}x${size}`, size, false));
                grid.appendChild(createIconCard(`Icon ${size}x${size} Maskable`, size, true));
            });
            
            document.getElementById('successMsg').classList.add('show');
            setTimeout(() => {
                document.getElementById('successMsg').classList.remove('show');
            }, 3000);
        }

        function downloadIcon(filename) {
            const card = document.querySelector(`[data-filename="${filename}"]`);
            const cards = Array.from(document.querySelectorAll('.icon-card'));
            const cardIndex = cards.findIndex(c => c.filename === filename);
            
            if (cardIndex !== -1) {
                const canvas = cards[cardIndex].canvasElement;
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            }
        }

        function downloadAll() {
            const cards = document.querySelectorAll('.icon-card');
            let count = 0;
            
            cards.forEach(card => {
                setTimeout(() => {
                    const canvas = card.canvasElement;
                    const filename = card.filename;
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                }, count * 200);
                count++;
            });
        }

        function copyToClipboard(button) {
            const canvas = button.closest('.icon-card').canvasElement;
            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
                const originalText = button.textContent;
                button.textContent = '✓ Copied!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            });
        }

        // Generate icons on page load
        window.addEventListener('load', generateAllIcons);
    </script>
</body>
</html>
